<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BikramC | Terminal Portfolio</title>
    <meta
      name="description"
      content="A terminal-style personal site. Type help."
    />
    <style>
      :root {
        --bg0: #050607;
        --bg1: #070c10;
        --fg0: #b8ffd8;
        --fg1: #76f7b2;
        --muted: #5fe0a1;
        --warn: #ffd07a;
        --err: #ff7a7a;
        --border: rgba(118, 247, 178, 0.22);
        --shadow: rgba(0, 0, 0, 0.55);
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--fg0);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        background: radial-gradient(
            1200px 900px at 20% 10%,
            rgba(118, 247, 178, 0.12),
            transparent 60%
          ),
          radial-gradient(
            900px 700px at 80% 0%,
            rgba(255, 208, 122, 0.08),
            transparent 55%
          ),
          linear-gradient(180deg, var(--bg1), var(--bg0));
      }

      .frame {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 16px 40px;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .chrome {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        background: rgba(6, 10, 12, 0.55);
        box-shadow: 0 20px 60px var(--shadow);
        border-radius: 14px;
        backdrop-filter: blur(10px);
      }

      .dots {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .dot.red {
        background: rgba(255, 122, 122, 0.9);
        border-color: rgba(255, 122, 122, 0.35);
      }
      .dot.yellow {
        background: rgba(255, 208, 122, 0.9);
        border-color: rgba(255, 208, 122, 0.35);
      }
      .dot.green {
        background: rgba(118, 247, 178, 0.9);
        border-color: rgba(118, 247, 178, 0.35);
      }

      .title {
        color: rgba(184, 255, 216, 0.9);
        font-size: 13px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hint {
        color: rgba(184, 255, 216, 0.6);
        font-size: 12px;
        white-space: nowrap;
      }

      .terminal {
        position: relative;
        flex: 1;
        min-height: 320px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(2, 4, 5, 0.62);
        box-shadow: 0 20px 60px var(--shadow);
        overflow: hidden;
      }

      .terminal::before {
        content: "";
        pointer-events: none;
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 4px
        );
        opacity: 0.14;
      }

      .screen {
        position: absolute;
        inset: 0;
        padding: 18px 16px 16px;
        overflow: auto;
        box-sizing: border-box;
        scroll-behavior: smooth;
      }

      .line {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
        font-size: 14px;
      }

      .line.dim {
        color: rgba(184, 255, 216, 0.65);
      }

      .line.warn {
        color: var(--warn);
      }

      .line.err {
        color: var(--err);
      }

      .line a {
        color: var(--fg1);
        text-decoration: none;
        border-bottom: 1px dashed rgba(118, 247, 178, 0.55);
      }

      .line a:hover {
        border-bottom-style: solid;
      }

      .prompt-row {
        display: flex;
        gap: 0;
        align-items: baseline;
        margin-top: 10px;
        position: relative;
      }

      .prompt {
        color: var(--muted);
        flex: 0 0 auto;
        white-space: pre;
      }

      .typed {
        flex: 0 1 auto;
        min-width: 0;
        white-space: pre;
      }

      .cursor {
        color: var(--fg1);
        flex: 0 0 auto;
        line-height: 1.2;
        transform: translateY(-1px);
        animation: blink 1s steps(1, end) infinite;
      }

      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .cmdline {
        /* Keep a real input for mobile keyboard and copy/paste, but render text ourselves. */
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.001;
        padding: 0;
        margin: 0;
        background: transparent;
        border: none;
        outline: none;
        color: var(--fg0);
        font: inherit;
        caret-color: transparent;
      }

      .cmdline::selection {
        background: rgba(118, 247, 178, 0.22);
      }

      .footer {
        color: rgba(184, 255, 216, 0.55);
        font-size: 12px;
        text-align: center;
        user-select: none;
      }

      @media (max-width: 520px) {
        .hint {
          display: none;
        }
        .line {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="chrome" aria-hidden="true">
        <div class="dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <div class="title">bikramC@portfolio:~</div>
        <div class="hint">Try: <span style="color: var(--fg1)">summary</span></div>
      </div>

      <main class="terminal" role="application" aria-label="Terminal portfolio">
        <div class="screen" id="screen">
          <div id="output" aria-live="polite" aria-atomic="false"></div>
          <div class="prompt-row" id="promptRow">
            <span class="prompt" id="prompt"></span>
            <span class="typed" id="typed"></span>
            <span class="cursor" id="cursor" aria-hidden="true">_</span>
            <input
              class="cmdline"
              id="cmdline"
              type="text"
              inputmode="text"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              aria-label="Command line"
            />
          </div>
        </div>
      </main>

      <div class="footer">Press Tab to autocomplete, Up/Down for history.</div>
    </div>

    <script>
      const PROFILE = {
        name: "Bikram Chidi",
        handle: "bikramC",
        role: "DevOps Engineer",
        location: "Lokanthali, Bhaktapur",
        email: "veekrum.thapa@gmail.com",
        github: "https://github.com/veekrum",
        linkedin: "https://www.linkedin.com/in/bikram-chidi-b53b56141/"
      };
      const PROMPT = `${PROFILE.handle}@portfolio:~$`;

      // Years of experience (CV: DevOps Trainee Feb 2017).
      const EXPERIENCE_START_ISO = "2017-02-01";
      const COMMANDS = [
        "help",
        "uptime",
        "whoami",
        "summary",
        "whyhireme",
        "principles",
        "philosophy",
        "experience",
        "education",
        "contact",
        "jokes",
        "htop",
        "skills",
        "neofetch",
        "ls",
        "cat",
        "github",
        "linkedin",
        "clear"
      ];

      const screen = document.getElementById("screen");
      const output = document.getElementById("output");
      const cmdline = document.getElementById("cmdline");
      const prompt = document.getElementById("prompt");
      const promptRow = document.getElementById("promptRow");
      const typed = document.getElementById("typed");

      const history = [];
      let historyIndex = 0;

      prompt.textContent = `${PROMPT} `;

      const JOKES = [
        [
          '"It works on my machine."',
          '"Then we\'ll ship your machine."',
          "-- The origin story of Docker"
        ],
        [
          "Why did the DevOps engineer quit?",
          "Because they had too many issues and not enough pull requests."
        ],
        [
          "A DevOps engineer walks into a bar.",
          'The bartender asks, "What\'ll it be?"',
          'Engineer says, "The usual."',
          "The bartender serves 12 beers, 3 of them are empty, 2 are on fire, and none of them are labeled."
        ],
        ['"We have 99 problems."', 'Kubernetes: "Here\'s 187 more."'],
        [
          "How many DevOps engineers does it take to change a lightbulb?",
          "None. That's a hardware problem. Open a ticket."
        ],
        [
          'A junior dev asks their manager: "Is it okay to deploy on Friday?"',
          'Manager: "Sure, if you hate your weekend."'
        ],
        [
          'Terraform plan: "I will create 3 resources."',
          'Terraform apply: "I have destroyed production."'
        ],
        [
          "Why did the monitoring alert go off at 3am?",
          "Because that's what monitoring alerts do. Always. Forever."
        ]
      ];

      const MOTDS = [
        "Good DevOps is not about the biggest stack — it's about the right stack.",
        "Badly designed DevOps is expensive. Well-designed DevOps saves time and money.",
        "Automate what repeats. Secure what matters. Monitor what you depend on.",
        "Build systems that are secure, reliable, and simple enough to trust.",
        "DevOps should reduce friction, not create more complexity.",
        "Security is not a gate at the end — it is part of the pipeline.",
        "Reliable systems should also be sustainable systems.",
        "Move fast, but leave observability on."
      ];

      const PROJECT_PROCESSES = [
        {
          name: "k8s-monitoring-stack",
          hint: "Prometheus/Grafana/ELK"
        },
        {
          name: "gitlab-cicd-migration",
          hint: "Pipelines + runners"
        },
        {
          name: "distributed-job-runner",
          hint: "Workers + queues"
        },
        {
          name: "helm-services",
          hint: "20+ microservices"
        }
      ];

      function scrollToBottom() {
        requestAnimationFrame(() => {
          screen.scrollTop = screen.scrollHeight;
        });
      }

      function printLine(text, className) {
        const div = document.createElement("div");
        div.className = className ? `line ${className}` : "line";
        const content = text === "" ? "\u00a0" : text;
        div.textContent = content;
        output.appendChild(div);
        scrollToBottom();
      }

      function printHTML(html, className) {
        const div = document.createElement("div");
        div.className = className ? `line ${className}` : "line";
        div.innerHTML = html;
        output.appendChild(div);
        scrollToBottom();
      }

      function printBannerAndIntro() {
        const now = new Date();
        const motd = MOTDS[Math.floor(Math.random() * MOTDS.length)];
        printLine("[ OK ] Loading profile...", "dim");
        printLine("[ OK ] Initializing interactive shell...", "dim");
        printLine("[ OK ] Mounting projects...", "dim");
        printLine("[ OK ] Starting observability modules...", "dim");
        printLine("[ OK ] Applying DevSecOps policies...", "dim");
        printLine("[ OK ] Portfolio shell ready.", "dim");
        printLine("");
        printLine("bikramc@portfolio", "dim");
        printLine("--------------------------", "dim");
        printLine("Role:        Sr. DevSecOps Engineer", "dim");
        printLine("Focus:       Kubernetes, CI/CD, Security, Observability", "dim");
        printLine("Mindset:     Practical, secure, cost-aware", "dim");
        printLine("Status:      Open to impactful engineering work", "dim");
        printLine("");
        printLine(`MOTD: ${motd}`);
        printLine("");
        printLine("Want to know more?  Start here:", "dim");
        printLine("summary      - quick overview", "dim");
        printLine("whyhireme    - why I stand out", "dim");
        printLine("principles   - how I think", "dim");
        printLine("contact      - let's connect", "dim");
        printLine("");
        printLine(`Last login: ${formatLoginTime(now)} on tty1`, "dim");
        printLine("System load: low | Portfolio mode: interactive", "dim");
      }

      function getExperienceUptimeString() {
        const start = new Date(EXPERIENCE_START_ISO + "T00:00:00Z");
        if (Number.isNaN(start.getTime())) return null;

        const now = new Date();
        const ms = Math.max(0, now.getTime() - start.getTime());
        const days = Math.floor(ms / 86400000);

        const years = Math.floor(days / 365.2425);
        const remainingDays = Math.max(0, days - Math.floor(years * 365.2425));
        const months = Math.max(
          0,
          Math.min(11, Math.floor(remainingDays / 30.436875))
        );

        const parts = [];
        if (years > 0) parts.push(`${years} year${years === 1 ? "" : "s"}`);
        if (months > 0) parts.push(`${months} month${months === 1 ? "" : "s"}`);
        if (parts.length === 0) parts.push(`${days} day${days === 1 ? "" : "s"}`);
        return parts.join(", ");
      }

      function resetPrompt() {
        prompt.textContent = `${PROMPT} `;
        cmdline.value = "";
        typed.textContent = "";
        cmdline.focus();
        scrollToBottom();
      }

      function normalizeSpaces(s) {
        return s.replace(/\s+/g, " ").trim();
      }

      function padRight(s, width) {
        const str = String(s);
        return str.length >= width ? str.slice(0, width) : str + " ".repeat(width - str.length);
      }

      function padLeft(s, width) {
        const str = String(s);
        return str.length >= width ? str.slice(0, width) : " ".repeat(width - str.length) + str;
      }

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      function fmtPct(n) {
        return `${n.toFixed(1)}%`;
      }

      function fmtTime(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }

      function formatLoginTime(date) {
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const day = days[date.getDay()];
        const month = months[date.getMonth()];
        const d = String(date.getDate()).padStart(2, "0");
        const h = String(date.getHours()).padStart(2, "0");
        const m = String(date.getMinutes()).padStart(2, "0");
        const s = String(date.getSeconds()).padStart(2, "0");
        const offsetMin = -date.getTimezoneOffset();
        const sign = offsetMin >= 0 ? "+" : "-";
        const abs = Math.abs(offsetMin);
        const offH = String(Math.floor(abs / 60)).padStart(2, "0");
        const offM = String(abs % 60).padStart(2, "0");
        return `${day} ${month} ${d} ${h}:${m}:${s} ${sign}${offH}${offM}`;
      }

      function runCommand(raw) {
        const trimmed = raw.trim();

        // Echo the executed command.
        printLine(`${PROMPT} ${trimmed}`);

        if (!trimmed) {
          return;
        }

        const normalized = normalizeSpaces(trimmed);
        const [cmd, ...args] = normalized.split(" ");

        switch (cmd) {
          case "help": {
            printLine("Available commands:", "dim");
            printLine(
              "help, uptime, whoami, summary, whyhireme, principles, philosophy, experience, education, contact, jokes, htop, skills, neofetch, ls, cat <file>, github, linkedin, clear",
              "dim"
            );
            break;
          }
          case "uptime": {
            const experience = getExperienceUptimeString();
            if (!experience) {
              printLine("uptime: invalid EXPERIENCE_START_ISO value", "err");
              break;
            }
            printLine(`Experience uptime: ${experience}`);
            break;
          }
          case "whoami": {
            printLine(`${PROFILE.name} | ${PROFILE.role}`);
            printLine("Kubernetes | GitLab CI/CD | Observability | Cloud automation", "dim");
            printLine(PROFILE.location, "dim");
            printLine(PROFILE.email, "dim");
            printLine("Type `contact` for links.", "dim");
            break;
          }
          case "summary": {
            printLine("SUMMARY", "dim");
            printLine(
              "I am very passionate about Linux and fond of the open-source community. Automation is the culture of DevOps: making others' and my own work simpler and easier. I find DevOps an attractive and effective role. I am sincere, straightforward, and helpful; together we can create meaningful work.",
              "dim"
            );
            break;
          }
          case "whyhireme": {
            printLine("I don't just deploy apps — I build reliable systems.", "dim");
            printLine("");
            printLine("- DevOps + DevSecOps mindset", "dim");
            printLine("- Strong focus on automation and reliability", "dim");
            printLine("- Comfortable with Kubernetes, CI/CD, Linux, and observability, AWS", "dim");
            printLine("- Security-aware approach to pipelines and infrastructure", "dim");
            printLine("- Approach problems with ownership, not just task completion", "dim");
            printLine("");
            printLine("What makes me different:", "dim");
            printLine("");
            printLine(
              "I think beyond \"it works\" — I think about how it scales, how it's monitored,",
              "dim"
            );
            printLine(
              "how it's secured, and how the team can operate it confidently.",
              "dim"
            );
            break;
          }
          case "principles": {
            printLine("Engineering principles I care about:", "dim");
            printLine("");
            printLine("- Automate what repeats", "dim");
            printLine("- Secure what matters", "dim");
            printLine("- Monitor what you depend on", "dim");
            printLine("- Keep systems simple enough to operate confidently", "dim");
            printLine("- Build for reliability, not just speed", "dim");
            printLine("- Choose the right tooling, not the most tooling", "dim");
            printLine("- Respect cost as a real engineering constraint", "dim");
            break;
          }
          case "philosophy": {
            printLine("My DevOps philosophy:", "dim");
            printLine("");
            printLine("- DevOps is not just about tools — it's about reducing friction", "dim");
            printLine("- Automation should save time, not create unnecessary complexity", "dim");
            printLine("- Security should be built in, not added later", "dim");
            printLine("- Observability should improve confidence, not become noise", "dim");
            printLine("- Infrastructure should be reliable, maintainable, and cost-aware", "dim");
            printLine("");
            printLine(
              "I believe DevOps should work for startups, growing teams, and enterprises —",
              "dim"
            );
            printLine(
              "not only for organizations with big budgets.",
              "dim"
            );
            break;
          }
          case "experience": {
            printLine("WORK HISTORY", "dim");
            printLine(
              "1) Sr. DevOps Engineer (Feb 2021 - Present) - Hazesoft.co, Shankamul, Kathmandu"
            );
            printLine(
              "   Lead team, manage GitLab + runners, CI/CD templates, helm/k8s for 20+ services, DigitalOcean + self-hosted OpenStack, Docker/Compose, NFS, Vault, VPN, ELK, Postgres/MySQL.",
              "dim"
            );
            printLine(
              "   E-commerce: sailracing.com, salamtak.me, commsure.com",
              "dim"
            );
            printLine("");
            printLine(
              "2) DevOps Engineer (Feb 2019 - Jul 2020) - Tekvortex Pvt. Ltd (Cloudchomp), Pulchowk, Lalitpur"
            );
            printLine(
              "   CI/CD with Jenkins + Bash, AWS CodeCommit integration via Lambda, Python utilities + AWS SDK, Terraform provisioning, monitoring/alerts, Azure exposure, JIRA, virtualization tools, Nagios + Slack alerts.",
              "dim"
            );
            printLine("");
            printLine(
              "3) Jr. DevOps Engineer (Dec 2017 - Feb 2019) - YoungInnovations, Kumaripati, Lalitpur"
            );
            printLine(
              "   Ansible provisioning, ELK stack, docker-compose microservices, GCP (Compute Engine/Storage), Nginx/Apache2, HAProxy, Asterisk (VOIP), Bash/Python utilities.",
              "dim"
            );
            printLine("");
            printLine(
              "4) DevOps Trainee (Feb 2017 - Sep 2017) - CloudFactory (Sprout Technology), Bhaisipati, Lalitpur"
            );
            printLine(
              "   AWS provisioning with Ansible, Prometheus + Grafana, Jenkins pipelines, app/db migration support, production debugging, MongoDB/Redis/RabbitMQ.",
              "dim"
            );
            break;
          }
          case "education": {
            printLine("EDUCATION", "dim");
            printLine("SLC - Buddha Jyoti H.S.S, Rupandehi, Lumbini, Nepal");
            printLine(
              "Intermediate - Buddha Jyoti H.S.S, Rupandehi, Lumbini, Nepal"
            );
            printLine(
              "BE Computer - Himalaya College of Engineering, Chyasal, Lalitpur"
            );
            break;
          }
          case "contact": {
            printLine("CONTACT", "dim");
            printLine(`Email: ${PROFILE.email}`);
            printLine(`Location: ${PROFILE.location}`, "dim");
            printHTML(
              `GitHub: <a href="${PROFILE.github}" target="_blank" rel="noopener">${PROFILE.github}</a>`
            );
            printHTML(
              `LinkedIn: <a href="${PROFILE.linkedin}" target="_blank" rel="noopener">${PROFILE.linkedin}</a>`
            );
            break;
          }
          case "jokes": {
            printLine("DEVOPS JOKE", "dim");
            const joke = JOKES[Math.floor(Math.random() * JOKES.length)];
            for (const line of joke) printLine(line);
            break;
          }
          case "htop": {
            // Snapshot-only simulation (no live keybinds) to keep the rest of the terminal simple.
            output.innerHTML = "";

            const exp = getExperienceUptimeString();
            const now = new Date();
            const timeStr = now.toLocaleString();

            const cpu = clamp(rand(4, 38), 0, 100);
            const mem = clamp(rand(12, 62), 0, 100);
            const load1 = rand(0.15, 1.65).toFixed(2);
            const load5 = rand(0.10, 1.20).toFixed(2);
            const load15 = rand(0.05, 0.90).toFixed(2);

            printLine(`htop - ${PROFILE.handle}@portfolio    ${timeStr}`, "dim");
            printLine(
              `Uptime: ${exp ?? "n/a"}    Load avg: ${load1} ${load5} ${load15}`,
              "dim"
            );
            printLine(
              `CPU  [${"#".repeat(Math.round(cpu / 5)).padEnd(20, ".")}] ${fmtPct(cpu)}   MEM [${"#".repeat(Math.round(mem / 5)).padEnd(20, ".")}] ${fmtPct(mem)}`,
              "dim"
            );
            printLine("");

            const header =
              `${padLeft("PID", 5)} ${padRight("USER", 8)} ${padLeft("PRI", 3)} ${padLeft("NI", 2)} ${padRight("S", 1)} ` +
              `${padLeft("CPU%", 6)} ${padLeft("MEM%", 6)} ${padLeft("TIME", 8)} COMMAND`;
            printLine(header, "dim");
            printLine("-".repeat(Math.min(86, header.length)), "dim");

            PROJECT_PROCESSES.forEach((p, i) => {
              const pid = 1200 + i * 37;
              const state = i === 0 ? "R" : "S";
              const cpuPct = clamp(rand(0.2, 18), 0, 100);
              const memPct = clamp(rand(0.1, 6.5), 0, 100);
              const time = fmtTime(rand(60, 7200));
              const cmd = `${p.name}  (${p.hint})`;
              const row =
                `${padLeft(pid, 5)} ${padRight(PROFILE.handle, 8)} ${padLeft(20, 3)} ${padLeft(0, 2)} ${padRight(state, 1)} ` +
                `${padLeft(cpuPct.toFixed(1), 6)} ${padLeft(memPct.toFixed(1), 6)} ${padLeft(time, 8)} ${cmd}`;
              printLine(row);
            });

            printLine("");
            printLine("Tip: run `projects` for details. Type `clear` to exit dashboard.", "dim");
            break;
          }
          case "skills": {
            printLine("Cloud & Infra:", "dim");
            printLine("- Linux, Nginx, Cloudflare, Digitalocean, AWS", "dim");
            printLine("");
            printLine("Containers & Orchestration:", "dim");
            printLine("- Docker, Kubernetes, Helm", "dim");
            printLine("");
            printLine("CI/CD:", "dim");
            printLine("- GitLab CI/CD, GitHub Actions, GitLab CI/CD Templates", "dim");
            printLine("");
            printLine("Observability:", "dim");
            printLine("- Prometheus, Grafana, Alertmanager, Sentry", "dim");
            printLine("");
            printLine("DevSecOps:", "dim");
            printLine("- SonarQube, Trivy, Secret Management, TLS Hardening, Secure Pipelines", "dim");
            printLine("");
            printLine("Databases & Backup:", "dim");
            printLine("- PostgreSQL, MongoDB", "dim");
            printLine("");
            printLine("IaC & Automation:", "dim");
            printLine("- Terraform, Ansible", "dim");
            printLine("");
            printLine("Secrets & Vault:", "dim");
            printLine("- HashiCorp Vault", "dim");
            break;
          }
          case "neofetch": {
            printLine(`User: ${PROFILE.name}`);
            printLine(`Role: ${PROFILE.role}`);
            printLine("Stack: Kubernetes / Helm / Docker");
            printLine("CI/CD: GitLab CI/CD / Jenkins");
            printLine("Cloud: AWS / GCP / DigitalOcean / OpenStack");
            printLine("Focus: Automation + Observability");
            break;
          }
          case "ls": {
            printLine(
              "about.txt  summary.txt  experience.txt  education.txt  contact.txt  jokes.txt  skills.txt"
            );
            break;
          }
          case "cat": {
            const file = args.join(" ");
            if (!file) {
              printLine("usage: cat <file>", "warn");
              break;
            }
            if (file === "about.txt") {
              runCommand("whoami");
              break;
            }
            if (file === "summary.txt") {
              runCommand("summary");
              break;
            }
            if (file === "experience.txt") {
              runCommand("experience");
              break;
            }
            if (file === "education.txt") {
              runCommand("education");
              break;
            }
            if (file === "contact.txt") {
              runCommand("contact");
              break;
            }
            if (file === "jokes.txt") {
              runCommand("jokes");
              break;
            }
            if (file === "skills.txt") {
              runCommand("skills");
              break;
            }
            printLine(`cat: ${file}: No such file`, "err");
            break;
          }
          case "github": {
            const url = PROFILE.github;
            printHTML(`GitHub: <a href="${url}" target="_blank" rel="noopener">${url}</a>`);
            break;
          }
          case "linkedin": {
            const url = PROFILE.linkedin;
            printHTML(
              `LinkedIn: <a href="${url}" target="_blank" rel="noopener">${url}</a>`
            );
            break;
          }
          case "clear": {
            output.innerHTML = "";
            printBannerAndIntro();
            break;
          }
          default: {
            printLine(`Command not found: ${cmd}`, "err");
            printLine("Type `help` to see available commands.", "dim");
          }
        }
      }

      cmdline.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const cmd = cmdline.value;

          // Only store non-empty commands.
          if (cmd.trim()) {
            history.push(cmd);
            historyIndex = history.length;
          }

          runCommand(cmd);
          resetPrompt();
          return;
        }

        if (e.key === "ArrowUp") {
          if (history.length === 0) return;
          e.preventDefault();
          historyIndex = Math.max(0, historyIndex - 1);
          cmdline.value = history[historyIndex] ?? "";
          typed.textContent = cmdline.value;
          cmdline.setSelectionRange(cmdline.value.length, cmdline.value.length);
          return;
        }

        if (e.key === "ArrowDown") {
          if (history.length === 0) return;
          e.preventDefault();
          historyIndex = Math.min(history.length, historyIndex + 1);
          cmdline.value = history[historyIndex] ?? "";
          typed.textContent = cmdline.value;
          cmdline.setSelectionRange(cmdline.value.length, cmdline.value.length);
          return;
        }

        if (e.key === "Tab") {
          e.preventDefault();
          const current = cmdline.value;
          const normalized = normalizeSpaces(current);
          const [head, ...tail] = normalized.split(" ");

          // Only autocomplete the command itself (first token).
          if (tail.length > 0) return;

          const match = COMMANDS.find((c) => c.startsWith(head));
          if (match) {
            cmdline.value = match;
            typed.textContent = cmdline.value;
            cmdline.setSelectionRange(cmdline.value.length, cmdline.value.length);
          }
        }
      });

      cmdline.addEventListener("input", () => {
        typed.textContent = cmdline.value;
      });

      // Keep focus behavior terminal-like.
      promptRow.addEventListener("pointerdown", () => {
        cmdline.focus();
      });
      promptRow.addEventListener("touchstart", () => {
        cmdline.focus();
      });
      promptRow.addEventListener("click", () => {
        cmdline.focus();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey) {
          // If user starts typing anywhere, focus the terminal.
          cmdline.focus();
        }
      });

      // Auto-show banner + intro on load.
      printBannerAndIntro();
      resetPrompt();
    </script>
  </body>
</html>
